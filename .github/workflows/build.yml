name: Build and Push Portfolio

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          echo "version=v${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build \
            -t ghcr.io/lt-dogfish/portfoliosite:latest \
            -t ghcr.io/lt-dogfish/portfoliosite:${{ steps.version.outputs.version }} \
            .

      - name: Push image
        run: |
          docker push ghcr.io/lt-dogfish/portfoliosite:latest
          docker push ghcr.io/lt-dogfish/portfoliosite:${{ steps.version.outputs.version }}
